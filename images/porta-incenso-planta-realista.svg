<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Porta-incenso realista em formato de folha sobre mesa de madeira">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3efe9"/>
      <stop offset="100%" stop-color="#e5ddd2"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b4865d"/>
      <stop offset="100%" stop-color="#8f6545"/>
    </linearGradient>
    <linearGradient id="leafMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8dc28a"/>
      <stop offset="100%" stop-color="#4f8f5f"/>
    </linearGradient>
    <linearGradient id="leafEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5d4a1"/>
      <stop offset="50%" stop-color="#6ea56d"/>
      <stop offset="100%" stop-color="#3f7a4c"/>
    </linearGradient>
    <radialGradient id="highlight" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="tableNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.33  0 0 0 0 0.24  0 0 0 0 0.18  0 0 0 0.10 0"/>
    </filter>

    <filter id="leafTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" result="grain"/>
      <feColorMatrix type="saturate" values="0.2"/>
      <feBlend in="SourceGraphic" in2="grain" mode="soft-light"/>
    </filter>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="22" flood-color="#2a221b" flood-opacity="0.35"/>
    </filter>

    <filter id="smoke" x="-40%" y="-60%" width="220%" height="260%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="620" fill="url(#wall)"/>
  <rect y="620" width="1600" height="380" fill="url(#wood)"/>
  <rect y="620" width="1600" height="380" filter="url(#tableNoise)" opacity="0.35"/>

  <g opacity="0.18" stroke="#6f4f36" stroke-width="3">
    <path d="M0 700 C300 680 600 730 900 700 C1200 670 1400 710 1600 690" fill="none"/>
    <path d="M0 760 C350 740 700 790 1050 760 C1300 738 1460 780 1600 760" fill="none"/>
    <path d="M0 840 C310 815 700 865 1030 838 C1300 818 1450 860 1600 840" fill="none"/>
  </g>

  <ellipse cx="820" cy="820" rx="430" ry="90" fill="#2e251f" opacity="0.2"/>

  <g transform="translate(360 270)" filter="url(#shadow)">
    <path d="M470 40c170 66 314 208 360 366c40 137-18 235-166 286c-165 57-371 15-528-108C3 485-28 332 44 213C119 89 283 17 470 40z"
      fill="url(#leafMain)" stroke="url(#leafEdge)" stroke-width="12"/>

    <path d="M96 282c218 56 470 52 710-18" stroke="#d9efd5" stroke-opacity="0.78" stroke-width="22" stroke-linecap="round" fill="none"/>

    <path d="M198 194c98 92 169 214 185 357" stroke="#d4eccf" stroke-opacity="0.68" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M338 145c106 99 174 224 194 366" stroke="#c8e5c2" stroke-opacity="0.58" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M505 121c93 84 158 197 185 336" stroke="#c7e2bf" stroke-opacity="0.52" stroke-width="7" stroke-linecap="round" fill="none"/>

    <path d="M470 40c170 66 314 208 360 366c40 137-18 235-166 286c-165 57-371 15-528-108C3 485-28 332 44 213C119 89 283 17 470 40z"
      fill="url(#highlight)"/>

    <g transform="translate(640 247) rotate(-10)">
      <circle cx="0" cy="0" r="12" fill="#2b3f2e"/>
      <rect x="2" y="-4" width="338" height="8" rx="4" fill="#5a4133"/>
      <rect x="328" y="-10" width="26" height="20" rx="8" fill="#b94c32"/>
      <path d="M350 -30c28 8 44 35 36 60c-30-11-48-37-36-60z" fill="#ece7df" opacity="0.92"/>
    </g>

    <path d="M470 40c170 66 314 208 360 366c40 137-18 235-166 286c-165 57-371 15-528-108C3 485-28 332 44 213C119 89 283 17 470 40z"
      filter="url(#leafTexture)" opacity="0.3"/>
  </g>

  <g opacity="0.52" filter="url(#smoke)">
    <path d="M1090 438c36-36 44-78 26-116c42 30 58 74 28 132c-18 34-12 66 26 98c-58-20-90-68-80-114z" fill="#ece8e2"/>
    <path d="M1140 426c30-26 38-54 24-85c30 21 41 54 20 97c-11 24-7 45 20 67c-42-13-65-47-64-79z" fill="#f5f3ef"/>
  </g>

  <text x="90" y="936" font-family="Manrope, Arial, sans-serif" font-size="44" fill="#f4eee7">Porta-incenso em formato de folha</text>
  <text x="90" y="978" font-family="Manrope, Arial, sans-serif" font-size="28" fill="#e8dbcb">Ilustração realista para post de argila fria</text>
</svg>
